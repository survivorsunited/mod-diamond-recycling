name: Build and Release JAR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.value }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
      asset_name: ${{ steps.version.outputs.asset_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi

          if [[ -z "$version" ]]; then
            echo "Release version could not be determined." >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "artifact_name=diamond-recycling-$version" >> "$GITHUB_OUTPUT"
          echo "asset_name=diamond-recycling-$version.jar" >> "$GITHUB_OUTPUT"

      - name: Build JAR
        shell: pwsh
        run: ./build.ps1 -Version '${{ steps.version.outputs.value }}'

      - name: Upload built JAR
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: build/${{ steps.version.outputs.asset_name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built JAR
        uses: actions/download-artifact@v4.3.0
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: build

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
          ASSET_NAME: ${{ needs.build.outputs.asset_name }}
        shell: bash
        run: |
          tag="v$VERSION"
          asset_path="build/$ASSET_NAME"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset_path" --clobber
          else
            gh release create "$tag" "$asset_path" \
              --title "Diamond Recycling $VERSION" \
              --notes "Automated release for $tag."
          fi
